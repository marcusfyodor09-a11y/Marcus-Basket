<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#191b1d">
<title>Marcus Basket</title>
<style>
  :root {
    --bg: #191b1d;
    --bg-elevated: #232528;
    --panel: #2a2d31;
    --panel-hover: #34373c;
    --border: #393d43;
    --text: #ffffff;
    --muted: #b8bcc4;
    --muted-2: #8b8f96;
    --accent: #00a2ff;
    --accent-hot: #ff4444;
    --green: #4caf50;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: "Builder Sans", "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    padding-bottom: 48px;
  }

  /* Top nav bar — Roblox style */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #000000;
    padding: 12px 20px;
    padding-top: max(12px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.01em;
    text-decoration: none;
    color: #fff;
  }
  .logo-mark {
    width: 28px;
    height: 28px;
    background: #fff;
    transform: rotate(45deg);
    border-radius: 4px;
    position: relative;
  }
  .logo-mark::after {
    content: "";
    position: absolute;
    inset: 6px;
    background: #000;
    border-radius: 2px;
  }

  /* Hero section */
  .hero {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 16px;
  }
  .hero h1 {
    margin: 0 0 6px;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .hero .subtitle {
    margin: 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* Section header (Roblox-style "Continue" / "Popular" rows) */
  .section-header {
    max-width: 1100px;
    margin: 24px auto 12px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-header h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .section-header .pill {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  /* Game grid */
  .grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }
  .tile {
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
  }
  .tile:hover, .tile:focus-visible {
    transform: translateY(-3px);
    border-color: var(--accent);
    background: var(--panel-hover);
    outline: none;
  }
  .tile:active { transform: translateY(-1px); }

  .thumb {
    aspect-ratio: 1 / 1;
    width: 100%;
    display: block;
    background: #111;
  }
  .thumb svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .tile-meta {
    padding: 10px 12px 12px;
  }
  .tile-title {
    font-size: 0.95rem;
    font-weight: 700;
    margin: 0 0 4px;
    line-height: 1.2;
  }
  .tile-sub {
    font-size: 0.78rem;
    color: var(--muted-2);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .dot-live {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    display: inline-block;
  }

  footer {
    max-width: 1100px;
    margin: 48px auto 0;
    padding: 0 20px;
    color: var(--muted-2);
    font-size: 0.8rem;
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .hero { padding: 20px 16px 8px; }
    .hero h1 { font-size: 1.5rem; }
    .section-header { padding: 0 16px; margin-top: 18px; }
    .grid {
      padding: 0 16px;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .tile-title { font-size: 0.88rem; }
    .tile-sub { font-size: 0.72rem; }
  }
</style>
</head>
