<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows ME</title>
<style>
/* ========== RESET & VARIABLES ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Tahoma', 'MS Sans Serif', 'Segoe UI', sans-serif; font-size: 11px; }

:root {
  --me-desktop: #3A6EA5;
  --me-teal: #008080;
  --me-titlebar-active-start: #0A246A;
  --me-titlebar-active-end: #3A6EA5;
  --me-titlebar-inactive-start: #7F7F7F;
  --me-titlebar-inactive-end: #B5B5B5;
  --me-titlebar-text: #FFFFFF;
  --me-bevel-light: #FFFFFF;
  --me-bevel-mid: #DFDFDF;
  --me-bevel-dark: #808080;
  --me-bevel-darkest: #000000;
  --me-button-face: #C0C0C0;
  --me-dialog-bg: #C0C0C0;
  --me-select-bg: #0A246A;
  --me-select-text: #FFFFFF;
  --me-window-bg: #FFFFFF;
  --me-menu-bg: #C0C0C0;
  --me-menu-hover: #0A246A;
}

/* ========== BEVEL UTILITIES ========== */
.bevel-raised {
  border-top: 1px solid var(--me-bevel-light);
  border-left: 1px solid var(--me-bevel-light);
  border-right: 1px solid var(--me-bevel-darkest);
  border-bottom: 1px solid var(--me-bevel-darkest);
  box-shadow: inset -1px -1px 0 var(--me-bevel-dark), inset 1px 1px 0 var(--me-bevel-mid);
}
.bevel-sunken {
  border-top: 1px solid var(--me-bevel-dark);
  border-left: 1px solid var(--me-bevel-dark);
  border-right: 1px solid var(--me-bevel-light);
  border-bottom: 1px solid var(--me-bevel-light);
  box-shadow: inset 1px 1px 0 var(--me-bevel-darkest), inset -1px -1px 0 var(--me-bevel-mid);
}
.bevel-raised-thin {
  border-top: 1px solid var(--me-bevel-light);
  border-left: 1px solid var(--me-bevel-light);
  border-right: 1px solid var(--me-bevel-dark);
  border-bottom: 1px solid var(--me-bevel-dark);
}

/* ========== BOOT SCREEN ========== */
#boot-screen {
  position: fixed; inset: 0; background: #000; color: #AAA;
  font-family: 'Courier New', monospace; font-size: 13px;
  z-index: 99999; display: flex; flex-direction: column; padding: 20px;
  overflow: hidden;
}
#boot-screen.hidden { display: none; }
.boot-post-line { line-height: 1.5; white-space: pre; }
.boot-bios-splash {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; color: #AAA; text-align: center;
}
.boot-bios-splash h2 { font-size: 24px; color: #FFFFFF; margin-bottom: 10px; font-family: 'Courier New', monospace; }
.boot-bios-splash p { font-size: 13px; font-family: 'Courier New', monospace; }
.boot-scroll { flex: 1; overflow: hidden; }
.boot-scroll-inner { display: flex; flex-direction: column; justify-content: flex-end; min-height: 100%; }

/* Windows ME Logo Boot */
.boot-logo-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; background: #000;
}
.windows-flag { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; width: 80px; height: 70px; transform: skewX(-8deg); margin-bottom: 20px; }
.flag-red { background: #FF0000; border-radius: 2px 0 0 0; }
.flag-green { background: #00A800; border-radius: 0 2px 0 0; }
.flag-blue { background: #0000FF; border-radius: 0 0 0 2px; }
.flag-yellow { background: #FFD800; border-radius: 0 0 2px 0; }
.boot-logo-text { color: #FFFFFF; font-size: 18px; font-family: 'Tahoma', sans-serif; letter-spacing: 4px; margin-bottom: 40px; }
.boot-progress-bar {
  width: 200px; height: 20px; background: #000;
  border: 1px solid #333; position: relative; overflow: hidden;
}
.boot-progress-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: repeating-linear-gradient(90deg, #0A246A 0px, #0A246A 8px, transparent 8px, transparent 12px);
  animation: bootProgress 3s linear forwards;
}
@keyframes bootProgress { from { width: 0; } to { width: 100%; } }

/* ========== LOGIN SCREEN ========== */
#login-screen {
  position: fixed; inset: 0; z-index: 99998;
  background: linear-gradient(180deg, #0A246A 0%, #3A6EA5 50%, #A0C4E8 100%);
  display: none; align-items: center; justify-content: center;
}
#login-screen.visible { display: flex; }
.login-box {
  background: var(--me-button-face); padding: 0; width: 360px;
  border-top: 2px solid var(--me-bevel-light); border-left: 2px solid var(--me-bevel-light);
  border-right: 2px solid var(--me-bevel-darkest); border-bottom: 2px solid var(--me-bevel-darkest);
}
.login-titlebar {
  background: linear-gradient(90deg, var(--me-titlebar-active-start), var(--me-titlebar-active-end));
  color: white; padding: 3px 6px; font-weight: bold; font-size: 11px;
  display: flex; align-items: center; gap: 4px;
}
.login-body { padding: 16px; }
.login-body p { margin-bottom: 12px; font-size: 11px; }
.login-row { display: flex; align-items: center; margin-bottom: 8px; }
.login-row label { width: 80px; font-size: 11px; }
.login-row input {
  flex: 1; padding: 2px 4px; font-size: 11px; font-family: inherit;
  border-top: 1px solid var(--me-bevel-dark); border-left: 1px solid var(--me-bevel-dark);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
  background: #FFF; outline: none;
}
.login-buttons { display: flex; justify-content: flex-end; gap: 6px; margin-top: 16px; }
.me-btn {
  background: var(--me-button-face); font-family: inherit; font-size: 11px;
  padding: 2px 16px; min-width: 75px; cursor: pointer;
  border-top: 1px solid var(--me-bevel-light); border-left: 1px solid var(--me-bevel-light);
  border-right: 1px solid var(--me-bevel-darkest); border-bottom: 1px solid var(--me-bevel-darkest);
  box-shadow: inset -1px -1px 0 var(--me-bevel-dark), inset 1px 1px 0 var(--me-bevel-mid);
}
.me-btn:active {
  border-top: 1px solid var(--me-bevel-darkest); border-left: 1px solid var(--me-bevel-darkest);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
  box-shadow: inset 1px 1px 0 var(--me-bevel-dark); padding: 3px 15px 1px 17px;
}
.me-btn:focus { outline: 1px dotted #000; outline-offset: -4px; }

/* ========== DESKTOP ========== */
#desktop {
  position: fixed; inset: 0; bottom: 28px;
  background: var(--me-teal);
  display: none; user-select: none;
}
#desktop.visible { display: block; }
#desktop-icons {
  padding: 8px; display: flex; flex-direction: column; gap: 4px;
  position: absolute; top: 0; left: 0;
}
.desktop-icon {
  display: flex; flex-direction: column; align-items: center; width: 70px;
  padding: 4px; cursor: pointer; text-align: center; border: 1px solid transparent;
}
.desktop-icon:hover { background: rgba(0,0,255,0.15); }
.desktop-icon.selected { background: var(--me-select-bg); }
.desktop-icon.selected .desktop-icon-label { color: var(--me-select-text); }
.desktop-icon-img {
  width: 32px; height: 32px; margin-bottom: 2px;
  display: flex; align-items: center; justify-content: center;
  image-rendering: pixelated;
}
.desktop-icon-label {
  font-size: 11px; color: #FFFFFF; text-shadow: 1px 1px 1px #000;
  word-wrap: break-word; max-width: 68px; line-height: 1.2;
}

/* ========== TASKBAR ========== */
#taskbar {
  position: fixed; left: 0; right: 0; bottom: 0; height: 28px;
  background: var(--me-button-face); z-index: 9999;
  display: none; align-items: center;
  border-top: 1px solid var(--me-bevel-light);
  box-shadow: inset 0 1px 0 var(--me-bevel-mid);
}
#taskbar.visible { display: flex; }
#start-btn {
  background: var(--me-button-face); border: none; font-family: inherit; font-size: 11px;
  font-weight: bold; padding: 2px 6px; margin-left: 2px; cursor: pointer; display: flex;
  align-items: center; gap: 3px; height: 22px;
  border-top: 1px solid var(--me-bevel-light); border-left: 1px solid var(--me-bevel-light);
  border-right: 1px solid var(--me-bevel-darkest); border-bottom: 1px solid var(--me-bevel-darkest);
  box-shadow: inset -1px -1px 0 var(--me-bevel-dark), inset 1px 1px 0 var(--me-bevel-mid);
}
#start-btn.active {
  border-top: 1px solid var(--me-bevel-darkest); border-left: 1px solid var(--me-bevel-darkest);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
  box-shadow: inset 1px 1px 0 var(--me-bevel-dark);
}
.start-flag { width: 16px; height: 14px; display: inline-grid; grid-template-columns: 1fr 1fr; gap: 1px; transform: skewX(-6deg); }
.sf-r { background: #FF0000; } .sf-g { background: #00A800; } .sf-b { background: #0000FF; } .sf-y { background: #FFD800; }

#taskbar-windows {
  flex: 1; display: flex; gap: 2px; padding: 0 4px; overflow: hidden; height: 22px; align-items: center;
  border-left: 1px solid var(--me-bevel-dark); margin-left: 4px;
}
.taskbar-window-btn {
  background: var(--me-button-face); border: none; font-family: inherit; font-size: 11px;
  padding: 1px 8px; cursor: pointer; height: 20px; max-width: 160px; min-width: 60px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left;
  border-top: 1px solid var(--me-bevel-light); border-left: 1px solid var(--me-bevel-light);
  border-right: 1px solid var(--me-bevel-darkest); border-bottom: 1px solid var(--me-bevel-darkest);
  box-shadow: inset -1px -1px 0 var(--me-bevel-dark), inset 1px 1px 0 var(--me-bevel-mid);
}
.taskbar-window-btn.active {
  border-top: 1px solid var(--me-bevel-darkest); border-left: 1px solid var(--me-bevel-darkest);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
  box-shadow: inset 1px 1px 0 var(--me-bevel-dark); font-weight: bold;
  background: repeating-linear-gradient(90deg, var(--me-button-face) 0px, var(--me-button-face) 1px, #FFF 1px, #FFF 2px);
}
#taskbar-tray {
  display: flex; align-items: center; gap: 6px; padding: 0 8px; height: 22px;
  border-top: 1px solid var(--me-bevel-dark); border-left: 1px solid var(--me-bevel-dark);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
  margin-right: 2px; font-size: 11px;
}

/* ========== START MENU ========== */
#start-menu {
  position: fixed; bottom: 28px; left: 0; z-index: 10001;
  background: var(--me-button-face); display: none; flex-direction: row;
  border-top: 2px solid var(--me-bevel-light); border-left: 2px solid var(--me-bevel-light);
  border-right: 2px solid var(--me-bevel-darkest); border-bottom: 2px solid var(--me-bevel-darkest);
  min-width: 180px;
}
#start-menu.visible { display: flex; }
.start-menu-banner {
  width: 24px; background: linear-gradient(0deg, #0A246A, #3A6EA5);
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px;
}
.start-menu-banner span {
  color: #C0C0C0; font-weight: bold; font-size: 14px; writing-mode: vertical-rl;
  transform: rotate(180deg); letter-spacing: 2px;
}
.start-menu-items { display: flex; flex-direction: column; padding: 2px 0; flex: 1; }
.start-menu-item {
  display: flex; align-items: center; gap: 8px; padding: 4px 24px 4px 4px;
  cursor: pointer; font-size: 11px; position: relative; white-space: nowrap;
}
.start-menu-item:hover { background: var(--me-menu-hover); color: var(--me-select-text); }
.start-menu-item .item-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.start-menu-item .arrow { position: absolute; right: 6px; font-size: 8px; }
.start-menu-separator { height: 1px; background: var(--me-bevel-dark); margin: 2px 4px; box-shadow: 0 1px 0 var(--me-bevel-light); }
.start-submenu {
  position: absolute; left: 100%; bottom: 0;
  background: var(--me-button-face); display: none; flex-direction: column; padding: 2px 0;
  border-top: 2px solid var(--me-bevel-light); border-left: 2px solid var(--me-bevel-light);
  border-right: 2px solid var(--me-bevel-darkest); border-bottom: 2px solid var(--me-bevel-darkest);
  min-width: 160px;
}
.start-menu-item:hover > .start-submenu { display: flex; }

/* ========== CONTEXT MENU ========== */
#context-menu {
  position: fixed; z-index: 10002; display: none;
  background: var(--me-button-face); padding: 2px 0; min-width: 150px;
  border-top: 2px solid var(--me-bevel-light); border-left: 2px solid var(--me-bevel-light);
  border-right: 2px solid var(--me-bevel-darkest); border-bottom: 2px solid var(--me-bevel-darkest);
}
#context-menu.visible { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 8px; padding: 3px 24px 3px 28px;
  cursor: pointer; font-size: 11px; white-space: nowrap; position: relative;
}
.ctx-item:hover { background: var(--me-menu-hover); color: var(--me-select-text); }
.ctx-item.disabled { color: var(--me-bevel-dark); }
.ctx-item.disabled:hover { background: transparent; color: var(--me-bevel-dark); }
.ctx-separator { height: 1px; background: var(--me-bevel-dark); margin: 2px 2px; box-shadow: 0 1px 0 var(--me-bevel-light); }
.ctx-submenu {
  position: absolute; left: 100%; top: -2px;
  background: var(--me-button-face); display: none; padding: 2px 0; min-width: 130px;
  border-top: 2px solid var(--me-bevel-light); border-left: 2px solid var(--me-bevel-light);
  border-right: 2px solid var(--me-bevel-darkest); border-bottom: 2px solid var(--me-bevel-darkest);
}
.ctx-item:hover > .ctx-submenu { display: block; }
.ctx-item .arrow { position: absolute; right: 6px; font-size: 8px; }

/* ========== WINDOW CHROME ========== */
.me-window {
  position: absolute; background: var(--me-button-face); display: flex; flex-direction: column;
  border-top: 2px solid var(--me-bevel-light); border-left: 2px solid var(--me-bevel-light);
  border-right: 2px solid var(--me-bevel-darkest); border-bottom: 2px solid var(--me-bevel-darkest);
  min-width: 200px; min-height: 120px;
}
.me-window.minimized { display: none; }
.window-titlebar {
  background: linear-gradient(90deg, var(--me-titlebar-active-start), var(--me-titlebar-active-end));
  color: var(--me-titlebar-text); display: flex; align-items: center; padding: 2px 3px;
  cursor: default; gap: 3px; flex-shrink: 0; height: 20px;
}
.me-window.inactive .window-titlebar {
  background: linear-gradient(90deg, var(--me-titlebar-inactive-start), var(--me-titlebar-inactive-end));
}
.window-titlebar-icon { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; }
.window-title { flex: 1; font-size: 11px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.titlebar-buttons { display: flex; gap: 1px; flex-shrink: 0; }
.tb-btn {
  width: 16px; height: 14px; background: var(--me-button-face); border: none; cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 10px; font-weight: bold; line-height: 1;
  display: flex; align-items: center; justify-content: center; padding: 0;
  border-top: 1px solid var(--me-bevel-light); border-left: 1px solid var(--me-bevel-light);
  border-right: 1px solid var(--me-bevel-darkest); border-bottom: 1px solid var(--me-bevel-darkest);
}
.tb-btn:active {
  border-top: 1px solid var(--me-bevel-darkest); border-left: 1px solid var(--me-bevel-darkest);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
}
.tb-btn.close-btn { margin-left: 2px; }
.window-menubar {
  display: flex; gap: 0; padding: 1px 0; background: var(--me-button-face); flex-shrink: 0;
  border-bottom: 1px solid var(--me-bevel-dark);
}
.window-menubar span {
  padding: 1px 8px; cursor: pointer; font-size: 11px;
}
.window-menubar span:hover { background: var(--me-menu-hover); color: var(--me-select-text); }
.window-toolbar {
  display: flex; align-items: center; gap: 2px; padding: 2px 4px;
  background: var(--me-button-face); flex-shrink: 0;
  border-bottom: 1px solid var(--me-bevel-dark);
}
.toolbar-btn {
  background: var(--me-button-face); border: 1px solid transparent; padding: 1px 4px;
  cursor: pointer; font-family: inherit; font-size: 11px; display: flex; align-items: center; gap: 2px;
}
.toolbar-btn:hover { border-top: 1px solid var(--me-bevel-light); border-left: 1px solid var(--me-bevel-light); border-right: 1px solid var(--me-bevel-dark); border-bottom: 1px solid var(--me-bevel-dark); }
.toolbar-sep { width: 1px; height: 18px; background: var(--me-bevel-dark); margin: 0 2px; box-shadow: 1px 0 0 var(--me-bevel-light); }
.toolbar-addr {
  flex: 1; display: flex; align-items: center; gap: 4px;
}
.toolbar-addr label { font-size: 11px; white-space: nowrap; }
.toolbar-addr input {
  flex: 1; padding: 1px 4px; font-size: 11px; font-family: inherit;
  border-top: 1px solid var(--me-bevel-dark); border-left: 1px solid var(--me-bevel-dark);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
  background: #FFF; outline: none;
}
.window-content {
  flex: 1; overflow: auto; background: var(--me-window-bg); position: relative;
  border: 1px solid var(--me-bevel-dark); margin: 0 2px;
}
.window-statusbar {
  display: flex; align-items: center; padding: 1px 4px; font-size: 11px; flex-shrink: 0;
  background: var(--me-button-face); min-height: 18px;
  border-top: 1px solid var(--me-bevel-dark);
}
.statusbar-section {
  padding: 0 4px;
  border-top: 1px solid var(--me-bevel-dark); border-left: 1px solid var(--me-bevel-dark);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
}

/* Resize handles */
.resize-handle { position: absolute; z-index: 5; }
.resize-n { top: -3px; left: 4px; right: 4px; height: 6px; cursor: n-resize; }
.resize-s { bottom: -3px; left: 4px; right: 4px; height: 6px; cursor: s-resize; }
.resize-e { right: -3px; top: 4px; bottom: 4px; width: 6px; cursor: e-resize; }
.resize-w { left: -3px; top: 4px; bottom: 4px; width: 6px; cursor: w-resize; }
.resize-nw { top: -3px; left: -3px; width: 8px; height: 8px; cursor: nw-resize; }
.resize-ne { top: -3px; right: -3px; width: 8px; height: 8px; cursor: ne-resize; }
.resize-sw { bottom: -3px; left: -3px; width: 8px; height: 8px; cursor: sw-resize; }
.resize-se { bottom: -3px; right: -3px; width: 8px; height: 8px; cursor: se-resize; }

/* ========== FILE EXPLORER STYLES ========== */
.explorer-body { display: flex; height: 100%; }
.explorer-tree {
  width: 180px; min-width: 120px; overflow: auto; background: #FFF;
  border-right: 1px solid var(--me-bevel-dark); padding: 2px; font-size: 11px;
}
.explorer-files { flex: 1; overflow: auto; background: #FFF; font-size: 11px; }
.tree-item { display: flex; align-items: center; gap: 2px; padding: 1px 2px; cursor: pointer; white-space: nowrap; }
.tree-item:hover { background: #E8E8E8; }
.tree-item.selected { background: var(--me-select-bg); color: var(--me-select-text); }
.tree-toggle { width: 12px; text-align: center; font-size: 8px; flex-shrink: 0; cursor: pointer; }
.tree-children { padding-left: 16px; }
.tree-icon { font-size: 12px; flex-shrink: 0; }

/* File list detail view */
.file-list-header {
  display: flex; background: var(--me-button-face); border-bottom: 1px solid var(--me-bevel-dark);
  position: sticky; top: 0; z-index: 1;
}
.file-list-header span {
  padding: 2px 8px; font-size: 11px; cursor: pointer; flex-shrink: 0;
  border-right: 1px solid var(--me-bevel-dark); border-bottom: 1px solid var(--me-bevel-dark);
  border-top: 1px solid var(--me-bevel-light); border-left: 1px solid var(--me-bevel-light);
}
.file-list-header span:hover { background: var(--me-bevel-mid); }
.fh-name { width: 180px; } .fh-size { width: 80px; } .fh-type { width: 120px; } .fh-modified { width: 120px; }
.file-row {
  display: flex; align-items: center; padding: 1px 0; cursor: pointer; font-size: 11px;
}
.file-row:hover { background: #E8E8E8; }
.file-row.selected { background: var(--me-select-bg); color: var(--me-select-text); }
.file-cell { padding: 1px 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.fc-name { width: 180px; display: flex; align-items: center; gap: 4px; }
.fc-size { width: 80px; text-align: right; } .fc-type { width: 120px; } .fc-modified { width: 120px; }
.file-icon { font-size: 12px; flex-shrink: 0; }

/* Inline rename */
.inline-rename {
  font-family: inherit; font-size: 11px; padding: 0 2px; border: 1px solid #000;
  outline: none; width: 120px;
}

/* ========== BROWSER STYLES ========== */
.browser-bookmarks {
  display: flex; gap: 0; padding: 2px 4px; background: var(--me-button-face); flex-shrink: 0;
  border-bottom: 1px solid var(--me-bevel-dark);
}
.bookmark-btn {
  background: transparent; border: 1px solid transparent; padding: 1px 8px;
  cursor: pointer; font-family: inherit; font-size: 11px;
}
.bookmark-btn:hover {
  border-top: 1px solid var(--me-bevel-light); border-left: 1px solid var(--me-bevel-light);
  border-right: 1px solid var(--me-bevel-dark); border-bottom: 1px solid var(--me-bevel-dark);
}
.bookmark-btn.active { font-weight: bold; background: var(--me-bevel-mid); }
.browser-viewport { flex: 1; overflow: auto; background: #FFF; padding: 0; }

/* ========== 90s WEBSITE STYLES ========== */
.site-90s { font-family: 'Times New Roman', serif; }
.site-90s a { color: #0000FF; text-decoration: underline; cursor: pointer; }
.site-90s a:visited { color: #800080; }
.site-90s hr { border: none; height: 2px; background: linear-gradient(90deg, transparent, #666, transparent); margin: 8px 0; }
.blink-text { animation: blink90 1s steps(1) infinite; color: #FF0000; font-weight: bold; }
@keyframes blink90 { 50% { opacity: 0; } }
.marquee-text {
  display: inline-block; white-space: nowrap;
  animation: marquee90 8s linear infinite;
}
@keyframes marquee90 { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
.construction-bar {
  height: 20px; background: repeating-linear-gradient(45deg, #FFD800 0px, #FFD800 10px, #000 10px, #000 20px);
  background-size: 28px 28px; animation: constructionMove 0.5s linear infinite;
}
@keyframes constructionMove { to { background-position: 28px 0; } }
.visitor-counter {
  display: inline-block; background: #000; color: #0F0; font-family: 'Courier New', monospace;
  padding: 2px 8px; font-size: 14px; border: 2px inset #666;
}
.sparkle-bg {
  background-color: #000033;
  background-image: radial-gradient(1px 1px at 10% 20%, #FFF, transparent),
    radial-gradient(1px 1px at 30% 60%, #FFF, transparent),
    radial-gradient(1px 1px at 50% 10%, #FFF, transparent),
    radial-gradient(1px 1px at 70% 80%, #FFF, transparent),
    radial-gradient(1px 1px at 90% 40%, #FFF, transparent),
    radial-gradient(1px 1px at 15% 90%, #FFF, transparent),
    radial-gradient(1px 1px at 85% 15%, #FFF, transparent),
    radial-gradient(1.5px 1.5px at 45% 45%, #FFD, transparent),
    radial-gradient(1.5px 1.5px at 65% 70%, #FFD, transparent);
}

/* ========== DISPLAY PROPERTIES ========== */
.props-tabs { display: flex; gap: 0; margin: 8px 8px 0; }
.props-tab {
  padding: 3px 12px; background: var(--me-button-face); cursor: pointer; font-size: 11px;
  border-top: 1px solid var(--me-bevel-light); border-left: 1px solid var(--me-bevel-light);
  border-right: 1px solid var(--me-bevel-darkest); border-bottom: none;
  position: relative; top: 1px;
}
.props-tab.active { background: var(--me-button-face); border-bottom: 1px solid var(--me-button-face); z-index: 1; font-weight: bold; }
.props-body {
  margin: 0 8px 8px; padding: 12px;
  border: 1px solid var(--me-bevel-dark);
  background: var(--me-button-face);
}
.wallpaper-preview {
  width: 200px; height: 150px; margin: 8px auto;
  border: 2px solid var(--me-bevel-dark);
  border-radius: 1px;
}
.wallpaper-list {
  height: 100px; overflow: auto; background: #FFF; margin: 8px 0;
  border-top: 1px solid var(--me-bevel-dark); border-left: 1px solid var(--me-bevel-dark);
  border-right: 1px solid var(--me-bevel-light); border-bottom: 1px solid var(--me-bevel-light);
}
.wallpaper-option { padding: 2px 6px; cursor: pointer; font-size: 11px; }
.wallpaper-option:hover { background: var(--me-select-bg); color: var(--me-select-text); }
.wallpaper-option.selected { background: var(--me-select-bg); color: var(--me-select-text); }

/* ========== SHUTDOWN SCREEN ========== */
#shutdown-screen {
  position: fixed; inset: 0; background: #000; z-index: 99999;
  display: none; align-items: center; justify-content: center;
  color: #FFD800; font-size: 20px; font-family: 'Tahoma', sans-serif;
}
#shutdown-screen.visible { display: flex; }

/* ========== LOADING OVERLAY ========== */
#loading-overlay {
  position: fixed; inset: 0; background: var(--me-teal); z-index: 99997;
  display: none; align-items: center; justify-content: center;
  color: #FFF; font-size: 13px;
}
#loading-overlay.visible { display: flex; }

/* ========== DIALOG (confirm, alert) ========== */
.me-dialog-overlay {
  position: fixed; inset: 0; background: transparent; z-index: 10003;
  display: flex; align-items: center; justify-content: center;
}
.me-dialog {
  background: var(--me-button-face); min-width: 280px;
  border-top: 2px solid var(--me-bevel-light); border-left: 2px solid var(--me-bevel-light);
  border-right: 2px solid var(--me-bevel-darkest); border-bottom: 2px solid var(--me-bevel-darkest);
}
.me-dialog .window-titlebar { cursor: default; }
.me-dialog-body { padding: 16px; display: flex; gap: 12px; align-items: flex-start; }
.me-dialog-icon { font-size: 28px; flex-shrink: 0; }
.me-dialog-text { font-size: 11px; line-height: 1.4; }
.me-dialog-buttons { display: flex; justify-content: center; gap: 8px; padding: 0 16px 12px; }

/* ========== NOTEPAD ========== */
.notepad-textarea {
  width: 100%; height: 100%; border: none; outline: none; resize: none;
  font-family: 'Courier New', monospace; font-size: 12px; padding: 4px;
}
</style>
</head>

    ini: 'Configuration File', html: 'HTML Document', mid: 'MIDI File', ttf: 'TrueType Font',
    hlp: 'Help File', com: 'MS-DOS Application', tmp: 'Temporary File', jpg: 'JPEG Image' };
  return types[node.ext] || 'File';
}
function resolvePath(pathStr) {
  const parts = pathStr.replace(/^C:\\?/i, '').split('\\').filter(Boolean);
  let node = filesystem;
  for (const part of parts) {
    if (!node.children) return null;
    node = node.children.find(c => c.name.toLowerCase() === part.toLowerCase());
    if (!node) return null;
  }
  return node;
}
function getParent(node, root) {
  if (!root) root = filesystem;
  if (!root.children) return null;
  for (const child of root.children) {
    if (child === node) return root;
    if (child.children) {
      const found = getParent(node, child);
      if (found) return found;
    }
  }
  return null;
}
function getNodePath(node, root, prefix) {
  if (!root) root = filesystem;
  if (!prefix) prefix = 'C:';
  if (root === node) return prefix;
  if (!root.children) return null;
  for (const child of root.children) {
    const p = prefix + '\\' + child.name;
    if (child === node) return p;
    if (child.children) {
      const found = getNodePath(node, child, p);
      if (found) return found;
    }
  }
  return null;
}

function startBoot() {
  const screen = document.getElementById('boot-screen');
  screen.classList.remove('hidden');
  screen.innerHTML = '';
  screen.style.display = 'flex';

  // Phase 1: POST
  const postLines = [
    'PhoenixBIOS 4.0 Release 6.0',
    'Copyright 1985-2000 Phoenix Technologies Ltd.',
    '',
    'Pentium III CPU at 700MHz',
    'Memory Test:  ',
  ];
  let html = postLines.map(l => `<div class="boot-post-line">${l}</div>`).join('');
  screen.innerHTML = html;

  let ramCount = 0;
  const ramTarget = 65536;
  const ramLine = screen.querySelectorAll('.boot-post-line');
  const ramEl = ramLine[ramLine.length - 1];
  const ramInterval = setInterval(() => {
    ramCount += 8192;
    if (ramCount >= ramTarget) {
      ramCount = ramTarget;
      clearInterval(ramInterval);
      ramEl.textContent = `Memory Test:  ${ramCount}K OK`;
      setTimeout(() => {
        screen.innerHTML += '<div class="boot-post-line">Keyboard............Detected</div>';
        screen.innerHTML += '<div class="boot-post-line">Mouse...............Detected</div>';
        screen.innerHTML += '<div class="boot-post-line">Hard Disk...........Detected</div>';
        setTimeout(bootPhase2, 600);
      }, 300);
    } else {
      ramEl.textContent = `Memory Test:  ${ramCount}K`;
    }
  }, 80);
}

// ========== WALLPAPER HELPER ==========
function applyWallpaper(el, wpName) {
  // Remove old background properties then apply new ones
  el.style.background = 'none';
  el.style.backgroundColor = '';
  el.style.backgroundImage = '';
  el.style.backgroundSize = '';
  el.style.backgroundPosition = '';
  // Apply the wallpaper CSS string
  const css = WALLPAPERS[wpName] || WALLPAPERS['Teal'];
  el.style.cssText = el.style.cssText.replace(/background[^;]*;/g, '') + css;
}

// ========== DESKTOP ==========
function showDesktop() {
  const desktop = document.getElementById('desktop');
  desktop.classList.add('visible');

function renderDesktopIcons() {
  const container = document.getElementById('desktop-icons');
  const icons = [

function selectDesktopIcon(el) {

// ========== CLOCK ==========
function startClock() {
  function update() {
    const d = new Date();
    let h = d.getHours(); const m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h}:${String(m).padStart(2, '0')} ${ampm}`;
  }
  update();
  setInterval(update, 30000);
}

// ========== CONTEXT MENU ==========
function showContextMenu(x, y, items) {
  const menu = document.getElementById('context-menu');
  let html = '';
  for (const item of items) {
    if (item.separator) {
      html += '<div class="ctx-separator"></div>';
    } else if (item.submenu) {
      html += `<div class="ctx-item">${item.label} <span class="arrow">\u25B6</span>
        <div class="ctx-submenu">${item.submenu.map(s =>
          s.separator ? '<div class="ctx-separator"></div>' :
          `<div class="ctx-item" data-action="${s.action || ''}">${s.label}</div>`
        ).join('')}</div>
      </div>`;
    } else {
      html += `<div class="ctx-item${item.disabled ? ' disabled' : ''}" data-action="${item.action || ''}">${item.label}</div>`;
    }
  }
  menu.innerHTML = html;
  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - menu.offsetHeight - 30) + 'px';
  menu.classList.add('visible');

  menu.querySelectorAll('.ctx-item[data-action]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      hideContextMenu();
      if (action && window._ctxActions && window._ctxActions[action]) {
        window._ctxActions[action]();
      }
    });
  });
}

function hideContextMenu() {
  document.getElementById('context-menu').classList.remove('visible');
}

// ========== WINDOW MANAGER ==========
function createWindow(opts) {
  const id = 'win-' + state.nextWindowId++;
  const winState = {
    id, title: opts.title || 'Window', icon: opts.icon || '\uD83D\uDCBB',
    x: opts.x ?? 60 + Math.random() * 100, y: opts.y ?? 40 + Math.random() * 80,
    width: opts.width || 600, height: opts.height || 400,
    minWidth: opts.minWidth || 200, minHeight: opts.minHeight || 120,
    isMinimized: false, isMaximized: false, preMaxBounds: null,
    appType: opts.appType || 'generic',
    hasMenubar: opts.hasMenubar !== false,
    menubar: opts.menubar || null,
    toolbar: opts.toolbar || null,
    bookmarks: opts.bookmarks || null,
    statusText: opts.statusText || 'Ready',
    contentRenderer: opts.contentRenderer || (() => ''),
    onReady: opts.onReady || null,
  };
  state.windows.set(id, winState);

  const el = document.createElement('div');
  el.className = 'me-window';
  el.dataset.windowId = id;
  el.style.left = winState.x + 'px';
  el.style.top = winState.y + 'px';
  el.style.width = winState.width + 'px';
  el.style.height = winState.height + 'px';
  el.style.zIndex = ++state.zCounter;

  let menubarHtml = '';
  if (winState.hasMenubar && winState.menubar) {
    menubarHtml = `<div class="window-menubar">${winState.menubar.map(m => `<span>${m}</span>`).join('')}</div>`;
  }
  let toolbarHtml = winState.toolbar ? `<div class="window-toolbar">${winState.toolbar}</div>` : '';
  let bookmarksHtml = winState.bookmarks ? winState.bookmarks : '';

  el.innerHTML = `
    <div class="window-titlebar">
      <div class="window-titlebar-icon">${winState.icon}</div>
      <div class="window-title">${winState.title}</div>
      <div class="titlebar-buttons">
        <button class="tb-btn min-btn" title="Minimize">_</button>
        <button class="tb-btn max-btn" title="Maximize">\u25A1</button>
        <button class="tb-btn close-btn" title="Close">\u00D7</button>
      </div>
    </div>
    ${menubarHtml}
    ${toolbarHtml}
    ${bookmarksHtml}
    <div class="window-content">${winState.contentRenderer()}</div>
    <div class="window-statusbar"><span class="statusbar-section" style="flex:1;">${winState.statusText}</span></div>
    <div class="resize-handle resize-n"></div>
    <div class="resize-handle resize-s"></div>
    <div class="resize-handle resize-e"></div>
    <div class="resize-handle resize-w"></div>
    <div class="resize-handle resize-nw"></div>
    <div class="resize-handle resize-ne"></div>
    <div class="resize-handle resize-sw"></div>
    <div class="resize-handle resize-se"></div>
  `;

  document.getElementById('window-layer').appendChild(el);
  attachWindowEvents(el, id);
  focusWindow(id);
  updateTaskbar();
  if (winState.onReady) winState.onReady(el, id);
  return id;
}

function attachWindowEvents(el, id) {
  // Titlebar drag
  const titlebar = el.querySelector('.window-titlebar');
  titlebar.addEventListener('mousedown', e => {
    if (e.target.closest('.tb-btn')) return;
    const ws = state.windows.get(id);
    if (ws.isMaximized) return;
    focusWindow(id);
    const startX = e.clientX - el.offsetLeft;
    const startY = e.clientY - el.offsetTop;
    document.body.style.userSelect = 'none';
    const onMove = e2 => {
      el.style.left = (e2.clientX - startX) + 'px';
      el.style.top = (e2.clientY - startY) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.userSelect = '';
      ws.x = el.offsetLeft; ws.y = el.offsetTop;
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Title bar double-click to maximize
  titlebar.addEventListener('dblclick', e => {
    if (e.target.closest('.tb-btn')) return;
    toggleMaximize(id);
  });

  // Buttons
  el.querySelector('.close-btn').onclick = () => closeWindow(id);
  el.querySelector('.min-btn').onclick = () => minimizeWindow(id);
  el.querySelector('.max-btn').onclick = () => toggleMaximize(id);

  // Focus on click
  el.addEventListener('mousedown', () => focusWindow(id));

  // Resize handles
  el.querySelectorAll('.resize-handle').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const ws = state.windows.get(id);
      if (ws.isMaximized) return;
      focusWindow(id);
      const dir = [...handle.classList].find(c => c.startsWith('resize-') && c !== 'resize-handle').replace('resize-', '');
      const startX = e.clientX, startY = e.clientY;
      const startLeft = el.offsetLeft, startTop = el.offsetTop;
      const startW = el.offsetWidth, startH = el.offsetHeight;
      document.body.style.userSelect = 'none';
      const onMove = e2 => {
        let dx = e2.clientX - startX, dy = e2.clientY - startY;
        let newX = startLeft, newY = startTop, newW = startW, newH = startH;
        if (dir.includes('e')) newW = Math.max(ws.minWidth, startW + dx);
        if (dir.includes('w')) { newW = Math.max(ws.minWidth, startW - dx); newX = startLeft + startW - newW; }
        if (dir.includes('s')) newH = Math.max(ws.minHeight, startH + dy);
        if (dir.includes('n')) { newH = Math.max(ws.minHeight, startH - dy); newY = startTop + startH - newH; }
        el.style.left = newX + 'px'; el.style.top = newY + 'px';
        el.style.width = newW + 'px'; el.style.height = newH + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.style.userSelect = '';
        ws.x = el.offsetLeft; ws.y = el.offsetTop;
        ws.width = el.offsetWidth; ws.height = el.offsetHeight;
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function focusWindow(id) {
  state.activeWindowId = id;
  document.querySelectorAll('.me-window').forEach(w => {
    w.classList.toggle('inactive', w.dataset.windowId !== id);
  });
  const el = document.querySelector(`.me-window[data-window-id="${id}"]`);
  if (el) el.style.zIndex = ++state.zCounter;
  updateTaskbar();
}

function closeWindow(id) {
  const el = document.querySelector(`.me-window[data-window-id="${id}"]`);
  if (el) el.remove();
  state.windows.delete(id);
  if (state.activeWindowId === id) {
    state.activeWindowId = null;
    // Focus the topmost remaining window
    let topZ = 0, topId = null;
    state.windows.forEach((ws, wid) => {
      const wel = document.querySelector(`.me-window[data-window-id="${wid}"]`);
      if (wel && !ws.isMinimized && parseInt(wel.style.zIndex) > topZ) {
        topZ = parseInt(wel.style.zIndex); topId = wid;
      }
    });
    if (topId) focusWindow(topId);
  }
  updateTaskbar();
}

function minimizeWindow(id) {
  const ws = state.windows.get(id);
  if (!ws) return;
  ws.isMinimized = true;
  const el = document.querySelector(`.me-window[data-window-id="${id}"]`);
  if (el) el.classList.add('minimized');
  if (state.activeWindowId === id) state.activeWindowId = null;
  updateTaskbar();
}

function restoreWindow(id) {
  const ws = state.windows.get(id);
  if (!ws) return;
  ws.isMinimized = false;
  const el = document.querySelector(`.me-window[data-window-id="${id}"]`);
  if (el) el.classList.remove('minimized');
  focusWindow(id);
}

function toggleMaximize(id) {
  const ws = state.windows.get(id);
  if (!ws) return;
  const el = document.querySelector(`.me-window[data-window-id="${id}"]`);
  if (!el) return;
  if (ws.isMaximized) {
    // Restore
    ws.isMaximized = false;
    el.style.left = ws.preMaxBounds.x + 'px';
    el.style.top = ws.preMaxBounds.y + 'px';
    el.style.width = ws.preMaxBounds.w + 'px';
    el.style.height = ws.preMaxBounds.h + 'px';
    ws.preMaxBounds = null;
  } else {
    // Maximize
    ws.preMaxBounds = { x: el.offsetLeft, y: el.offsetTop, w: el.offsetWidth, h: el.offsetHeight };
    ws.isMaximized = true;
    el.style.left = '0px'; el.style.top = '0px';
    el.style.width = '100%';
    el.style.height = (window.innerHeight - 28) + 'px';
  }
}

function updateTaskbar() {
  const container = document.getElementById('taskbar-windows');
  container.innerHTML = '';
  state.windows.forEach((ws, id) => {
    const btn = document.createElement('button');
    btn.className = 'taskbar-window-btn' + (id === state.activeWindowId && !ws.isMinimized ? ' active' : '');
    btn.textContent = ws.title;
    btn.onclick = () => {
      if (ws.isMinimized) { restoreWindow(id); }
      else if (state.activeWindowId === id) { minimizeWindow(id); }
      else { focusWindow(id); }
    };
    container.appendChild(btn);
  });
}

function setWindowStatus(id, text) {
  const el = document.querySelector(`.me-window[data-window-id="${id}"] .statusbar-section`);
  if (el) el.textContent = text;
}

function setWindowTitle(id, title) {
  const ws = state.windows.get(id);
  if (ws) ws.title = title;
  const el = document.querySelector(`.me-window[data-window-id="${id}"] .window-title`);
  if (el) el.textContent = title;
  updateTaskbar();
}

function setWindowContent(id, html) {
  const el = document.querySelector(`.me-window[data-window-id="${id}"] .window-content`);
  if (el) el.innerHTML = html;
}

// ========== FILE EXPLORER ==========
function openExplorer(path) {
  path = path || 'C:';
  let currentNode = resolvePath(path) || filesystem;
  let selectedNode = null;
  let explorerWinId = null;

  function renderTree(node, depth) {
    const isFolder = node.type === 'folder' || node.type === 'drive';
    if (!isFolder) return '';
    const expanded = depth < 2;
    const icon = getFileIcon(node);
    const sel = node === currentNode ? ' selected' : '';
    let html = `<div class="tree-item${sel}" data-path="${getNodePath(node) || 'C:'}" style="padding-left:${depth * 8}px;">
      <span class="tree-toggle">${node.children && node.children.some(c => c.type === 'folder' || c.type === 'drive') ? (expanded ? '\u25BC' : '\u25B6') : ''}</span>
      <span class="tree-icon">${icon}</span>
      <span>${node.name}</span>
    </div>`;
    if (expanded && node.children) {
      html += `<div class="tree-children">`;
      for (const child of node.children) {
        if (child.type === 'folder' || child.type === 'drive') {
          html += renderTree(child, depth + 1);
        }
      }
      html += '</div>';
    }
    return html;
  }

  function renderFiles() {
    const node = currentNode;
    if (!node || !node.children) return '<div style="padding:20px;color:#666;">Empty</div>';
    let html = `<div class="file-list-header">
      <span class="fh-name">Name</span><span class="fh-size">Size</span>
      <span class="fh-type">Type</span><span class="fh-modified">Modified</span>
    </div>`;
    const sorted = [...node.children].sort((a, b) => {
      if (a.type === 'folder' && b.type !== 'folder') return -1;
      if (a.type !== 'folder' && b.type === 'folder') return 1;
      return a.name.localeCompare(b.name);
    });
    for (const child of sorted) {
      const icon = getFileIcon(child);
      const sel = child === selectedNode ? ' selected' : '';
      html += `<div class="file-row${sel}" data-name="${child.name}">
        <div class="file-cell fc-name"><span class="file-icon">${icon}</span> <span class="file-name-text">${child.name}</span></div>
        <div class="file-cell fc-size">${child.size || ''}</div>
        <div class="file-cell fc-type">${getFileType(child)}</div>
        <div class="file-cell fc-modified">${child.modified || ''}</div>
      </div>`;
    }
    return html;
  }

  function refresh() {
    if (!explorerWinId) return;
    const winEl = document.querySelector(`.me-window[data-window-id="${explorerWinId}"]`);
    if (!winEl) return;
    const content = winEl.querySelector('.window-content');
    content.innerHTML = `<div class="explorer-body">
      <div class="explorer-tree">${renderTree(filesystem, 0)}</div>
      <div class="explorer-files">${renderFiles()}</div>
    </div>`;
    const pathStr = getNodePath(currentNode) || 'C:';
    const addrInput = winEl.querySelector('.addr-input');
    if (addrInput) addrInput.value = pathStr;
    setWindowTitle(explorerWinId, pathStr + ' - Windows Explorer');
    const count = currentNode.children ? currentNode.children.length : 0;
    setWindowStatus(explorerWinId, `${count} object(s)`);
    attachExplorerEvents(winEl);
  }

  function attachExplorerEvents(winEl) {
    // Tree clicks
    winEl.querySelectorAll('.tree-item').forEach(el => {
      el.addEventListener('click', () => {
        const p = el.dataset.path;
        const node = resolvePath(p);
        if (node) { currentNode = node; selectedNode = null; refresh(); }
      });
    });
    // File row clicks
    winEl.querySelectorAll('.file-row').forEach(el => {
      el.addEventListener('click', () => {
        const name = el.dataset.name;
        const node = currentNode.children.find(c => c.name === name);
        selectedNode = node;
        winEl.querySelectorAll('.file-row').forEach(r => r.classList.remove('selected'));
        el.classList.add('selected');
      });
      el.addEventListener('dblclick', () => {
        const name = el.dataset.name;
        const node = currentNode.children.find(c => c.name === name);
        if (!node) return;
        if (node.type === 'folder') { currentNode = node; selectedNode = null; refresh(); }
        else if (node.ext === 'txt' && node.content) { openNotepad(node.name, node.content); }
      });
    });
    // File area context menu
    const filesArea = winEl.querySelector('.explorer-files');
    if (filesArea) {
      filesArea.addEventListener('contextmenu', e => {
        e.preventDefault(); e.stopPropagation();
        const row = e.target.closest('.file-row');
        const contextNode = row ? currentNode.children.find(c => c.name === row.dataset.name) : null;
        if (contextNode) selectedNode = contextNode;
        window._ctxActions = {
          'open': () => {
            if (contextNode && contextNode.type === 'folder') { currentNode = contextNode; selectedNode = null; refresh(); }
            else if (contextNode && contextNode.ext === 'txt' && contextNode.content) { openNotepad(contextNode.name, contextNode.content); }
          },
          'rename': () => {
            if (!contextNode) return;
            const nameEl = row.querySelector('.file-name-text');
            if (!nameEl) return;
            const input = document.createElement('input');
            input.className = 'inline-rename';
            input.value = contextNode.name;
            nameEl.replaceWith(input);
            input.focus(); input.select();
            const finish = () => {
              const newName = input.value.trim();
              if (newName && newName !== contextNode.name) {
                contextNode.name = newName;
                if (contextNode.type === 'file') {
                  const dot = newName.lastIndexOf('.');
                  contextNode.ext = dot > 0 ? newName.slice(dot + 1) : '';
                }
              }
              refresh();
            };
            input.addEventListener('keydown', e2 => { if (e2.key === 'Enter') finish(); if (e2.key === 'Escape') refresh(); });
            input.addEventListener('blur', finish);
          },
          'delete': () => {
            if (!contextNode) return;
            showDialog('Confirm File Delete',
              `Are you sure you want to send '${contextNode.name}' to the Recycling Bin?`,
              [{ label: 'Yes', action: () => {
                const idx = currentNode.children.indexOf(contextNode);
                if (idx >= 0) {
                  currentNode.children.splice(idx, 1);
                  const bin = resolvePath('C:\\Recycling Bin');
                  if (bin && bin.children) bin.children.push(contextNode);
                }
                selectedNode = null; refresh();
              }}, { label: 'No' }], '\u26A0\uFE0F');
          },
          'new-folder': () => {
            const newFolder = { name: 'New Folder', type: 'folder', children: [] };
            currentNode.children.push(newFolder);
            selectedNode = newFolder;
            refresh();
          },
          'new-txt': () => {
            const newFile = { name: 'New Text Document.txt', type: 'file', ext: 'txt', size: '0 KB', modified: '3/24/2001', content: '' };
            currentNode.children.push(newFile);
            selectedNode = newFile;
            refresh();
          },
        };
        const items = [];
        if (contextNode) {
          items.push({ label: 'Open', action: 'open' });
          items.push({ separator: true });
          items.push({ label: 'Rename', action: 'rename' });
          items.push({ label: 'Delete', action: 'delete' });
        } else {
          items.push({ label: 'New', submenu: [
            { label: 'Folder', action: 'new-folder' },
            { label: 'Text Document', action: 'new-txt' },
          ]});
          items.push({ separator: true });
          items.push({ label: 'Refresh', action: 'refresh' });
        }
        showContextMenu(e.clientX, e.clientY, items);
      });
    }
    // Back button
    const backBtn = winEl.querySelector('.explorer-back');
    if (backBtn) {
      backBtn.onclick = () => {
        const parent = getParent(currentNode);
        if (parent) { currentNode = parent; selectedNode = null; refresh(); }
      };
    }
    // Up button
    const upBtn = winEl.querySelector('.explorer-up');
    if (upBtn) {
      upBtn.onclick = () => {
        const parent = getParent(currentNode);
        if (parent) { currentNode = parent; selectedNode = null; refresh(); }
      };
    }
    // Address bar
    const addrInput = winEl.querySelector('.addr-input');
    if (addrInput) {
      addrInput.onkeydown = e => {
        if (e.key === 'Enter') {
          const node = resolvePath(addrInput.value);
          if (node && node.children) { currentNode = node; selectedNode = null; refresh(); }
        }
      };
    }
  }

  explorerWinId = createWindow({
    title: (getNodePath(currentNode) || 'C:') + ' - Windows Explorer',
    icon: '\uD83D\uDCC1',
    width: 650, height: 420,
    appType: 'explorer',
    menubar: ['File', 'Edit', 'View', 'Tools', 'Help'],
    toolbar: `<button class="toolbar-btn explorer-back">\u2190 Back</button>
      <button class="toolbar-btn explorer-up">\u2191 Up</button>
      <div class="toolbar-sep"></div>
      <div class="toolbar-addr"><label>Address:</label><input class="addr-input" value="${getNodePath(currentNode) || 'C:'}"></div>`,
    contentRenderer: () => `<div class="explorer-body">
      <div class="explorer-tree">${renderTree(filesystem, 0)}</div>
      <div class="explorer-files">${renderFiles()}</div>
    </div>`,
    onReady: (el) => attachExplorerEvents(el),
  });
}

// ========== INTERNET EXPLODER ==========
function openBrowser(url) {
  url = url || 'www.jahoo.com';
  let currentUrl = url;
  let browserWinId = null;

  function navigate(newUrl) {
    currentUrl = newUrl;
    const winEl = document.querySelector(`.me-window[data-window-id="${browserWinId}"]`);
    if (!winEl) return;
    const viewport = winEl.querySelector('.browser-viewport');
    const addrInput = winEl.querySelector('.browser-addr');
    if (addrInput) addrInput.value = 'http://' + currentUrl;
    // Update bookmarks active state
    winEl.querySelectorAll('.bookmark-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.url === currentUrl);
    });
    const site = PARODY_SITES[currentUrl];
    if (site) {
      viewport.innerHTML = site.html;
      setWindowTitle(browserWinId, site.title + ' - Internet Exploder');
      setWindowStatus(browserWinId, 'Done');
    } else {
      viewport.innerHTML = ERROR_PAGE;
      setWindowTitle(browserWinId, 'Navigation Error - Internet Exploder');
      setWindowStatus(browserWinId, 'Done');
    }
  }

  const bookmarkUrls = Object.keys(PARODY_SITES);
  const bookmarksHtml = `<div class="browser-bookmarks">${bookmarkUrls.map(u => {
    const site = PARODY_SITES[u];
    const label = site.title.length > 20 ? site.title.slice(0, 18) + '..' : site.title;
    return `<button class="bookmark-btn${u === currentUrl ? ' active' : ''}" data-url="${u}">${label}</button>`;
  }).join('')}</div>`;

  browserWinId = createWindow({
    title: (PARODY_SITES[currentUrl]?.title || currentUrl) + ' - Internet Exploder',
    icon: '\uD83C\uDF10',
    width: 720, height: 500,
    appType: 'browser',
    menubar: ['File', 'Edit', 'View', 'Favorites', 'Help'],
    toolbar: `<button class="toolbar-btn browser-back">\u2190</button>
      <button class="toolbar-btn browser-fwd">\u2192</button>
      <button class="toolbar-btn browser-refresh">\u21BB</button>
      <button class="toolbar-btn browser-home">\uD83C\uDFE0</button>
      <div class="toolbar-sep"></div>
      <div class="toolbar-addr"><label>Address:</label><input class="browser-addr" value="http://${currentUrl}"></div>`,
    bookmarks: bookmarksHtml,
    contentRenderer: () => {
      const site = PARODY_SITES[currentUrl];
      return `<div class="browser-viewport">${site ? site.html : ERROR_PAGE}</div>`;
    },
    onReady: (el) => {
      // Bookmark clicks
      el.querySelectorAll('.bookmark-btn').forEach(btn => {
        btn.onclick = () => navigate(btn.dataset.url);
      });
      // Address bar
      const addrInput = el.querySelector('.browser-addr');
      if (addrInput) {
        addrInput.onkeydown = e => {
          if (e.key === 'Enter') {
            let val = addrInput.value.replace(/^https?:\/\//, '').replace(/\/$/, '');
            navigate(val);
          }
        };
      }
      // Nav buttons
      el.querySelector('.browser-home').onclick = () => navigate('www.jahoo.com');
      el.querySelector('.browser-refresh').onclick = () => navigate(currentUrl);
    },
  });
}

// ========== NOTEPAD ==========
function openNotepad(filename, content) {
  filename = filename || 'Untitled';
  content = content || '';
  createWindow({
    title: filename + ' - Notepad',
    icon: '\uD83D\uDCC4',
    width: 500, height: 350,
    appType: 'notepad',
    menubar: ['File', 'Edit', 'Format', 'Help'],
    toolbar: null,
    contentRenderer: () => `<textarea class="notepad-textarea">${content.replace(/</g, '&lt;')}</textarea>`,
  });
}

// ========== DISPLAY PROPERTIES ==========
function openDisplayProperties() {
  let selectedWp = state.currentWallpaper;
  let propsWinId = null;

  function renderContent() {
    const wpNames = Object.keys(WALLPAPERS);
    return `<div style="padding:0;">
      <div class="props-tabs">
        <div class="props-tab active">Background</div>
        <div class="props-tab">Appearance</div>
        <div class="props-tab">Settings</div>
      </div>
      <div class="props-body">
        <div class="wallpaper-preview"></div>
        <div class="wallpaper-list">${wpNames.map(n =>
          `<div class="wallpaper-option${n === selectedWp ? ' selected' : ''}" data-wp="${n}">${n}</div>`
        ).join('')}</div>
        <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:8px;">
          <button class="me-btn wp-ok">OK</button>
          <button class="me-btn wp-cancel">Cancel</button>
          <button class="me-btn wp-apply">Apply</button>
        </div>
      </div>
    </div>`;
  }

  function attachEvents(el) {
    // Apply initial preview
    const initPreview = el.querySelector('.wallpaper-preview');
    if (initPreview) applyWallpaper(initPreview, selectedWp);
    el.querySelectorAll('.wallpaper-option').forEach(opt => {
      opt.onclick = () => {
        selectedWp = opt.dataset.wp;
        el.querySelectorAll('.wallpaper-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        const preview = el.querySelector('.wallpaper-preview');
        if (preview) applyWallpaper(preview, selectedWp);
      };
    });
    el.querySelector('.wp-apply')?.addEventListener('click', () => {
      state.currentWallpaper = selectedWp;
      applyWallpaper(document.getElementById('desktop'), selectedWp);
    });
    el.querySelector('.wp-ok')?.addEventListener('click', () => {
      state.currentWallpaper = selectedWp;
      applyWallpaper(document.getElementById('desktop'), selectedWp);
      closeWindow(propsWinId);
    });
    el.querySelector('.wp-cancel')?.addEventListener('click', () => {
      closeWindow(propsWinId);
    });
  }

  propsWinId = createWindow({
    title: 'Display Properties',
    icon: '\uD83C\uDFA8',
    width: 400, height: 420,
    appType: 'properties',
    hasMenubar: false,
    toolbar: null,
    contentRenderer: renderContent,
    onReady: (el) => attachEvents(el),
  });
}

  createWindow({
    title: 'About Windows ME',
    icon: '\u2753',
    width: 380, height: 280,
    hasMenubar: false,
    toolbar: null,
    contentRenderer: () => `<div style="padding:20px;text-align:center;font-size:12px;">
      <div style="display:inline-grid;grid-template-columns:1fr 1fr;gap:2px;width:50px;height:44px;transform:skewX(-6deg);margin-bottom:12px;">
        <div style="background:#FF0000;"></div><div style="background:#00A800;"></div>
        <div style="background:#0000FF;"></div><div style="background:#FFD800;"></div>
      </div>
      <h3 style="font-size:14px;margin:8px 0;">Microsoft Windows ME</h3>
      <p>Millennium Edition</p>
      <p style="margin:8px 0;">Version 4.90 (Build 3000)</p>
      <p style="color:#666;margin-top:12px;">This product is licensed to:<br><b>${state.loggedInUser}</b></p>
      <p style="color:#999;margin-top:16px;font-size:10px;">&copy; 2000 Microsoft Corporation<br>(Not really. This is a simulation.)</p>

// ========== DIALOGS ==========
function showDialog(title, message, buttons, icon) {
  const overlay = document.createElement('div');
  overlay.className = 'me-dialog-overlay';
  overlay.innerHTML = `<div class="me-dialog">
    <div class="window-titlebar" style="cursor:default;">
      <div class="window-title">${title}</div>
    </div>
    <div class="me-dialog-body">
      <div class="me-dialog-icon">${icon || '\u2139\uFE0F'}</div>
      <div class="me-dialog-text">${message}</div>
    </div>
    <div class="me-dialog-buttons">
      ${buttons.map((b, i) => `<button class="me-btn" data-idx="${i}">${b.label}</button>`).join('')}
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.me-btn').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.idx);
      overlay.remove();
      if (buttons[idx] && buttons[idx].action) buttons[idx].action();
    };
  });
}

// ========== SHUTDOWN ==========
function doShutdown() {
  showDialog('Shut Down Windows', 'Are you sure you want to shut down?',
    [{ label: 'OK', action: () => {
      document.getElementById('desktop').classList.remove('visible');
      document.getElementById('taskbar').classList.remove('visible');
      document.getElementById('desktop-icons').innerHTML = '';
      document.getElementById('window-layer').innerHTML = '';
      document.getElementById('start-menu').classList.remove('visible');
      state.windows.clear();
      const sd = document.getElementById('shutdown-screen');
      sd.classList.add('visible');
      sd.innerHTML = `<div style="text-align:center;">
        <div style="font-size:20px;">It's now safe to turn off<br>your computer.</div>
        <div style="font-size:12px;color:#999;margin-top:20px;">(Click anywhere to restart)</div>
      </div>`;
      sd.onclick = () => {
        sd.classList.remove('visible');
        sd.style.display = 'none';
        startBoot();
      };
    }},
    { label: 'Cancel' }], '\uD83D\uDD34');
}

// ========== PREVENT DEFAULT CONTEXT MENU ==========
document.addEventListener('contextmenu', e => {
  if (e.target.closest('#desktop') || e.target.closest('.me-window') || e.target.closest('#taskbar')) {
    e.preventDefault();
  }
});

// ========== INIT ==========
window.addEventListener('load', () => {
  startBoot();
});

// Handle window resize for maximized windows
window.addEventListener('resize', () => {
  state.windows.forEach((ws, id) => {
    if (ws.isMaximized) {
      const el = document.querySelector(`.me-window[data-window-id="${id}"]`);
      if (el) {
        el.style.width = '100%';
        el.style.height = (window.innerHeight - 28) + 'px';
      }
    }
  });
});
</script>
